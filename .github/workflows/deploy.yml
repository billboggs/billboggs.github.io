name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
      - name: Install Socket CLI
        run: npm install -g @socketsecurity/cli
      - name: Socket supply-chain scan
        # Scans the manifest/lockfile and exits non-zero on unhealthy alerts,
        # which fails this job and skips the gated `build` job below.
        # --org is passed explicitly: unlike the `socket ci` alias, `scan create`
        # does NOT resolve the org from the token and otherwise prompts for it,
        # which in CI (no TTY) bails out with exit 0 and silently skips scanning.
        # --no-interactive guarantees it errors rather than hangs on any prompt.
        # --repo/--branch associate the scan with this repo on the Socket
        # dashboard; --default-branch registers `main` so the alerts page
        # reflects its head scan.
        run: >
          socket scan create --report --no-interactive
          --org "$SOCKET_CLI_ORG_SLUG"
          --repo billboggs.github.io
          --branch ${{ github.ref_name }}
          --default-branch
        env:
          SOCKET_CLI_ORG_SLUG: personal-work-2pgvx
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_KEY }}
  build:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set package manager
        id: set-package-manager
        run: |
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "command=ci" >> $GITHUB_OUTPUT
          echo "runner=npx --no-install" >> $GITHUB_OUTPUT
          exit 0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          cache: ${{ steps.set-package-manager.outputs.manager }}
      - name: Install dependencies
        run: ${{ steps.set-package-manager.outputs.manager }} ${{ steps.set-package-manager.outputs.command }}
      - name: Build project
        run: ${{ steps.set-package-manager.outputs.runner }} npm run build
      - name: Test project
        run: ${{ steps.set-package-manager.outputs.runner }} npm run test
      - name: Upload artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
